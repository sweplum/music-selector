<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Selector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="particles"></canvas>

<div class="app-container">

    <header class="header">
        <h1>🎵 Music Selector</h1>
    </header>

    <div class="main-layout">

        <!-- LEFT SIDEBAR -->
        <aside class="sidebar glass">
            <h2>Controls</h2>

            <label class="file-upload">
                <input type="file" id="csvInput" accept=".csv">
                Browse CSV
            </label>

            <label class="control-label">Spin Speed</label>
            <input type="range" id="speedSlider" min="1" max="5" value="3">

            <label class="checkbox">
                <input type="checkbox" id="removeAfter"> Remove after selection
            </label>

            <button id="startBtn" class="btn spin-btn">Spin</button>
        </aside>

        <!-- MAIN DISPLAY -->
        <section class="display glass">

            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheelCanvas" width="400" height="400"></canvas>
            </div>

            <div class="equalizer" id="equalizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <h2 id="currentTitle" class="title-display">Browse a CSV to begin</h2>
            <img id="albumArt" class="album-art" style="display:none;">
            <p id="description" class="description"></p>

        </section>

        <!-- HISTORY PANEL -->
        <aside class="history glass">
            <h2>History</h2>
            <div id="history"></div>
            <button id="clearHistory" class="btn small">Clear History</button>
        </aside>

    </div>

</div>

<audio id="spinSound" src="spin.wav"></audio>
<audio id="dingSound" src="ding.wav"></audio>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="script.js"></script>

</body>
</html>
